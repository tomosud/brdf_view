<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BRDF Explorer (Web)</title>
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <h1>
          BRDF Explorer <small>web</small>
          <a
            class="title-link"
            href="https://github.com/tomosud/brdf_view"
            target="_blank"
            rel="noopener noreferrer"
            title="Open the tomosud/brdf_view repository on GitHub"
            >tomosud/brdf_view</a
          >
        </h1>
        <div id="toolbar">
          <label class="btn">
            Open BRDF…
            <input id="file-input" type="file" accept=".brdf,.binary" multiple hidden />
          </label>
          <button id="load-sample-brdf" class="btn" type="button">Load sample Brdf</button>
          <a
            class="toolbar-link"
            href="https://www.merl.com/research/downloads/BRDF"
            target="_blank"
            rel="noopener noreferrer"
            title="Open the MERL BRDF Database download page for measured .binary BRDF files."
            >MERL BRDF Database download</a
          >
          <select id="sample-brdf-select" class="toolbar-select" hidden></select>
        </div>
        <div id="parameter-panel"></div>
      </aside>
      <main id="views"></main>
    </div>
    <div id="fatal" hidden></div>
    <script type="module" src="./src/app.ts"></script>
  </body>
</html>
